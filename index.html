// ─── CALC ENGINE ───────────────────────────────────────
function calcSt(deals,m,dayNow){
  const sc=m.schema,tg=m.targets,d=deals||[];
  const counts={iron:0,credit:0,exchange:0,ptz:0,broker:0,cennik:0,interact:0};
  d.forEach(x=>{Object.keys(counts).forEach(k=>{if(x[k])counts[k]++;});});
  const kpiIronCount = d.filter(x=>x.iron||x.broker).length;   // для KPI
// НЕ перезаписываем counts.iron – он остаётся только выдачами
let kpi = 0;
Object.entries(sc).forEach(([k,cfg])=>{
  if(!cfg.includeInKpi)return;
  const t = tg[k]||0;
  const factVal = k==='iron' ? kpiIronCount : counts[k];   // используем отдельную переменную
  kpi += t>0 ? Math.min(factVal/t,1.0)*cfg.weight : 0;
});
// база earnings использует counts.iron (только выдачи) и counts.broker – без дубляжаЫ
  let earnBase=0,earnFixed=0;
  Object.entries(sc).forEach(([k,cfg])=>{
    if(cfg.fixedRate&&cfg.rate>0)earnFixed+=counts[k]*cfg.rate;
    else if(cfg.includeInEarn&&cfg.rate>0)earnBase+=counts[k]*cfg.rate;
  });
  const totalZP=Math.round(earnBase*kpi+earnFixed);
  const days=dayNow||m.days;
  const coef=days>0?m.days/days:1;
  const fc={};
  Object.keys(counts).forEach(k=>fc[k]=counts[k]*coef);
  fc.zp=Math.round(earnBase*coef*kpi+earnFixed);
  fc.earnBase=Math.round(earnBase*coef);
  return { counts, kpiIronCount, kpi, earnBase, earnFixed, totalZP, fc, schema: sc, targets: tg };
}

function getDeals(uid,mid){

function dayNowFor(mid){
  const m=S.months.find(x=>x.id===mid);if(!m)return null;
  const now=new Date();
  // detect current month by checking if today falls within this month's range
  // We use a simple heuristic: if selMid matches the latest month, use today's date
  const idx=S.months.indexOf(m);
  if(idx===S.months.length-1){
    // latest month = current
    return Math.min(now.getDate(),m.days);
  }
  return null;
}
function lastIdleDays(uid,mid){
  const d=getDeals(uid,mid);if(!d.length)return 999;
  const sorted=[...d].sort((a,b)=>b.date.localeCompare(a.date));

  const ref=new Date();
  return Math.max(0,Math.floor((ref-last)/86400000));
}

  ${day?`<div class="met"><div class="lb">Прогноз сделок</div><div class="vl" style="color:var(--ac)">${rows.reduce((a,r)=>a+Math.round(r.s.fc.iron),0)}</div></div>`:

// ─── ADMIN MGR DETAIL ───────────────────────────────────
function adminMgrDetail(uid){
  const u=S.users.find(x=>x.id===uid);if(!u)return'';
  const m=S.months.find(x=>x.id===selMid)||S.months[0];if(!m)return'';
  const day=dayNowFor(selMid);
  const deals=getDeals(uid,selMid);
  const s=calcSt(deals,m,day);
  const all=allDealsOf(uid);
  const brands=brandTop(all);
  const yrs=yearGroups(all);
  const idle=lastIdleDays(uid,selMid);
  const allSt=S.months.map(mo=>{const ds=getDeals(uid,mo.id);const st=calcSt(ds,mo,mo.id===selMid?day:null);return{...st,name:mo.name.slice(0,3),target:mo.targets.iron,month:mo};});
  const maxB=Math.max(...allSt.map(x=>x.counts.iron),m.targets.iron,1);

  // Risk assessment
  const risks=[];
  if(idle>=3)risks.push({lvl:'high',text:`Простой ${idle} дней — нет выдач`});
  if(s.kpi<0.5)risks.push({lvl:'high',text:`KPI критически низкий: ${fmtKpi(s.kpi)}`});
  else if(s.kpi<0.8)risks.push({lvl:'med',text:`KPI ниже нормы: ${fmtKpi(s.kpi)}`});
  const crPct=pct(s.counts.credit,m.targets.credit||8);
  if(crPct<50)risks.push({lvl:'med',text:`Кредит выполнен на ${crPct}%`});
  const exPct=pct(s.counts.exchange,m.targets.exchange||7);
  if(exPct<50)risks.push({lvl:'med',text:`Трейд-ин выполнен на ${exPct}%`});
  if(risks.length===0)risks.push({lvl:'ok',text:'Показатели в норме'});

  return `
<button class="btn gh sm mb14" onclick="selMgr=null;renderAdmin()">← Назад</button>
<div class="flex ia g12 mb14">${avHtml(u.av,46)}
  <div>
    <div style="font-size:18px;font-weight:700">${u.name}</div>
    <div class="xs mu">Всего сделок: <b>${all.length}</b> · Логин: ${u.login}</div>
    <div class="xs mt8">${idle===0?`<span style="color:var(--gr)">● активен сегодня</span>`:
      idle<3?`<span style="color:var(--ye)">● ${idle} дн. без выдач</span>`:
      `<span style="color:var(--re)">⚠ простой ${idle} дней!</span>`}</div>
  </div>
  <div style="margin-left:auto;text-align:right">
    <div style="font-size:22px;font-weight:700;color:var(--gr)">${fmt(s.totalZP)} ₽</div>
    <div class="xs mu">KPI: <b style="color:${kpiC(s.kpi)}">${fmtKpi(s.kpi)}</b> · ${m.name}</div>
  </div>
</div>

<div class="g4 mb14">
  <div class="met"><div class="lb">Сделок (${m.name})</div><div class="vl">${s.kpiIronCount}/${m.targets.iron}</div></div>
  <div class="met"><div class="lb">KPI</div><div class="vl" style="color:${kpiC(s.kpi)}">${fmtKpi(s.kpi)}</div></div>
  <div class="met"><div class="lb">База заработка</div><div class="vl">${fmt(s.earnBase)} ₽</div></div>
  <div class="met"><div class="lb">ЗП итого</div><div class="vl" style="color:var(--gr)">${fmt(s.totalZP)} ₽</div></div>
</div>

${day?`<div class="al inf mb14">📅 День ${day}/${m.days} · Прогноз сделок: <b>${Math.round(s.fc.iron)}</b> · Прогноз ЗП: <b>${fmt(s.fc.zp)} ₽</b></div>`:''}

<div class="g2 mb14">
  <div class="card">
    <div class="sh">Оценка рисков</div>
    ${risks.map(r=>`<div class="risk-card risk-${r.lvl}">
      <span class="xs fw6">${r.lvl==='high'?'🔴':r.lvl==='med'?'🟡':'🟢'} ${r.text}</span>
    </div>`).join('')}
    ${idle>=3||s.kpi<0.7?`<div class="mt12">
      <div class="xs fw6 mb8" style="color:var(--or)">Рекомендации:</div>
      <div class="xs mu" style="line-height:1.8">
        ${idle>=3?'• Требуется встреча — обсудить причины простоя<br>':''}
        ${s.kpi<0.7?'• Провести разбор звонков и встреч с клиентами<br>':''}
        ${pct(s.counts.credit,m.targets.credit||8)<60?'• Усилить работу по кредитным предложениям<br>':''}
        ${pct(s.counts.exchange,m.targets.exchange||7)<60?'• Системно предлагать трейд-ин на каждой сделке<br>':''}
      </div>
    </div>`:''}
  </div>
  <div class="card">
    <div class="sh">Выполнение плана — ${m.name}</div>
    ${Object.entries(m.schema).filter(([,c])=>c.includeInKpi).map(([k,c])=>{
      const v=s.counts[k],t=m.targets[k]||0,p=pct(v,t);
      return `<div class="mb8"><div class="flex jb xs mb8"><span class="fw6">${c.name} <span class="mu">вес ${c.weight}</span></span><span style="color:${barC(p)}">${v}/${t} · ${p}%</span></div>
        <div class="pb"><div class="pf" style="width:${p}%;background:${barC(p)}"></div></div></div>`;
    }).join('')}
    <div class="dv"></div>
    <div class="flex jb xs fw6"><span>KPI итог:</span><span style="color:${kpiC(s.kpi)}">${fmtKpi(s.kpi)}</span></div>
  </div>
</div>

<div class="g2 mb14">
  <div class="card">
    <div class="sh">Динамика по месяцам</div>
    <div class="bc" style="height:120px">
      ${allSt.map(ms=>{
        const h=Math.round(ms.counts.iron/maxB*95)+2,th=Math.round(ms.target/maxB*95)+2;
        const col=ms.counts.iron>=ms.target?'var(--gr)':ms.counts.iron>=ms.target*.7?'var(--ye)':'var(--re)';
        return `<div class="bc-col"><div class="xs fw6" style="color:${col}">${ms.counts.iron}</div>
          <div style="display:flex;align-items:flex-end;gap:2px;height:95px">
            <div class="bc-fill" style="background:${col};height:${h}px;flex:1"></div>
            <div class="bc-fill" style="background:var(--bd2);height:${th}px;flex:1"></div>
          </div><div style="font-size:10px;color:var(--mu)">${ms.name}</div></div>`;
      }).join('')}
    </div>
    <div class="flex g12 xs mu mt8"><span>█ Факт</span><span style="color:var(--bd2)">█ Цель</span></div>
  </div>
  <div class="card">
    <div class="sh">Топ марок (все месяцы)</div>
    ${brands.length?brands.slice(0,7).map(([b,c])=>`<div class="mb8">
      <div class="flex jb xs mb8"><span>${b}</span><span class="fw6">${c}</span></div>
      <div class="pb"><div class="pf" style="width:${all.length?Math.round(c/all.length*100):0}%;background:var(--ac)"></div></div>
    </div>`).join(''):'<div class="xs mu">Нет данных</div>'}
  </div>
</div>

<div class="g2 mb14">
  <div class="card">
    <div class="sh">Навыки (все завершённые месяцы)</div>
    ${(()=>{
      const comp=allSt.filter(ms=>!dayNowFor(ms.month.id));
      if(!comp.length)return'<div class="xs mu">Нет завершённых месяцев</div>';
      return[
        {l:'Железо',v:Math.round(comp.reduce((a,x)=>a+pct(x.counts.iron,x.target),0)/comp.length)},
        {l:'Кредит',v:Math.round(comp.reduce((a,x)=>a+pct(x.counts.credit,x.month.targets.credit||8),0)/comp.length)},
        {l:'Трейд-ин',v:Math.round(comp.reduce((a,x)=>a+pct(x.counts.exchange,x.month.targets.exchange||7),0)/comp.length)},
        {l:'Брокер',v:Math.min(Math.round(comp.reduce((a,x)=>a+x.counts.broker,0)/comp.length/3*100),120)},
        {l:'ПТЗ',v:Math.round(comp.reduce((a,x)=>a+pct(x.counts.ptz,x.month.targets.ptz||4),0)/comp.length)},
      ].map(sk=>`<div class="flex ia jb" style="padding:7px 0;border-bottom:1px solid var(--bd)">
        <span class="sm">${sk.l}</span>
        <div class="flex ia g8">
          <div style="width:90px;height:5px;background:var(--s3);border-radius:3px"><div style="width:${Math.min(sk.v,100)}%;height:100%;border-radius:3px;background:${barC(sk.v)}"></div></div>
          <span class="bdg ${sk.v>=100?'bg':sk.v>=70?'by':'br'}">${sk.v}%</span>
        </div>
      </div>`).join('');
    })()}
  </div>
  <div class="card">
    <div class="sh">Год выпуска авто</div>
    ${yrs.map(([g,c])=>`<div class="mb8">
      <div class="flex jb xs mb8"><span>${g}</span><span class="fw6">${c} шт.</span></div>
      <div class="pb"><div class="pf" style="width:${all.length?Math.round(c/all.length*100):0}%;background:var(--pu)"></div></div>
    </div>`).join('')||'<div class="xs mu">Нет данных</div>'}
  </div>
</div>

<div class="card">
  <div class="sh">Сделки — ${m.name} (${deals.length})</div>
  ${deals.length?`<div class="sc tw"><table>
    <thead><tr><th>#</th><th>Дата</th><th>Марка</th><th>Модель</th><th>VIN</th><th>Год</th>
      ${Object.entries(m.schema).map(([,c])=>`<th>${c.name}</th>`).join('')}
    </tr></thead>
    <tbody>
    ${[...deals].sort((a,b)=>b.date.localeCompare(a.date)).map((d,i)=>`<tr>
      <td class="mu xs">${i+1}</td><td>${d.date}</td>

// ─── ADMIN ANALYTICS ────────────────────────────────────
function adminAnalytics(){
  const mgrs=getManagers();
  const m=S.months.find(x=>x.id===selMid)||S.months[0];
  if(!m||!mgrs.length)return`<div class="card"><div class="xs mu" style="text-align:center;padding:30px">Нет данных для анализа</div></div>`;
  const day=dayNowFor(selMid);

  const rows=mgrs.map(u=>{
    const s=calcSt(getDeals(u.id,selMid),m,day);
    const all=allDealsOf(u.id);
    const idle=lastIdleDays(u.id,selMid);
    const allSt=S.months.map(mo=>{const ds=getDeals(u.id,mo.id);return{...calcSt(ds,mo,null),name:mo.name.slice(0,3),month:mo};});
    return{u,s,all,idle,allSt};
  });

  // Сортировка по KPI
  const sorted=[...rows].sort((a,b)=>b.s.kpi-a.s.kpi);

  // Кто нуждается в проработке
  const needAttention=rows.filter(r=>r.idle>=3||r.s.kpi<0.6);

  return `
<div class="card mb14">
  <div class="sh">Рейтинг эффективности — ${m.name}</div>
  <div class="tw"><table>
    <thead><tr><th>#</th><th>Сотрудник</th><th>Сделки</th><th>KPI</th>
      ${Object.entries(m.schema).filter(([,c])=>c.includeInEarn||c.fixedRate).map(([,c])=>`<th>${c.name}</th>`).join('')}
      <th>Брокер</th><th>Ценник</th><th>ЗП</th><th>Статус</th>
    </tr></thead>
    <tbody>
    ${sorted.map(({u,s},i)=>{
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      return `<tr>

        <td>${c.includeInKpi?`<input type="number" step="0.05" value="${c.weight}" onchange="updSchema('${selMid}','${k}','weight',this.value)" style="width:55px;padding:3px 6px;font-size:12px"/>`:`<span class="xs mu">—</span>`}</td>
        <td style="text-align:center">${k==='cennik'?`<span class="xs mu">—</span>`:`<input type="checkbox" ${c.includeInEarn?'checked':''} onchange="updSchema('${selMid}','${k}','includeInEarn',this.checked)"/>`}</td>
      </tr>`).join('')}

    </table></div>
    <div class="flex g8 mt12">
      <button class="btn pr sm" onclick="copySchemaToAll('${selMid}')">Применить ко всем месяцам</button>
      <button class="btn sm" onclick="updMonthDays('${selMid}',prompt('Дней в ${m.name}:',${m.days}))">Дней: ${m.days}</button>

  </div>
</div>
<div class="card">
  <div class="sh">Пользователи</div>
  <table>
    <thead><tr><th>Имя</th><th>Логин</th><th>Роль</th><th></th></tr></thead>
    <tbody>
    ${S.users.map(u=>`<tr>
      <td><div class="flex ia g6">${avHtml(u.av,24)}<span>${u.name}</span></div></td>

// ─── MANAGER VIEW ───────────────────────────────────────
function renderManager(){
  const u=S.user;
  const mgrNav=[{id:'deals',ico:'📋',lbl:'Мои выдачи'},{id:'stats',ico:'📊',lbl:'Статистика'},{id:'forecast',ico:'🎯',lbl:'Прогноз'}]
    .map(t=>`<div class="ni${mgrTab===t.id?' on':''}" onclick="setMgrTabFn('${t.id}')"><span class="ni-ico">${t.ico}</span>${t.lbl}</div>`).join('');
  const m=S.months.find(x=>x.id===selMid)||S.months[0];
  if(!m){R(shell(mgrNav,'<div class="al wa">Нет месяцев. Обратитесь к руководителю.</div>'));return;}
  const day=dayNowFor(selMid);
  const deals=getDeals(u.id,selMid);
  const s=calcSt(deals,m,day);
  let c='';
  if(mgrTab==='deals')c=mgrDeals(u,m,deals,s,day);
  if(mgrTab==='stats')c=mgrStats(u,m,s,day);
  if(mgrTab==='forecast')c=mgrForecast(u,m,s,day);
  R(shell(mgrNav,c));
}

  </div>
  <div class="card">
    <div class="sh">Расчёт ЗП</div>
    <div class="xs" style="color:var(--mu);line-height:2.2">

      ${Object.entries(m.schema).map(([,c])=>`<th>${c.name}</th>`).join('')}<th></th>

// ─── MGR STATS ──────────────────────────────────────────

  return `

  <div class="met"><div class="lb">Трейд-ин</div><div class="vl">${filteredDeals.filter(d=>d.exchange).length}</div></div>

        const col=ms.counts.iron>=ms.target?'var(--gr)':ms.counts.iron>=ms.target*.7?'var(--ye)':'var(--re)';

  </div>
  <div class="card">
    <div class="sh">KPI по месяцам</div>
    ${allSt.map(ms=>`<div class="flex ia jb" style="padding:6px 0;border-bottom:1px solid var(--bd)">
      <span class="sm">${ms.month.name}</span>

    </div>`).join(''):'<div class="xs mu">Нет данных</div>'}

    </div>`).join('')||'<div class="xs mu">Нет данных</div>'}

  <div class="card">

      const cnt=filteredDeals.filter(d=>d[k]).length;

        </div>
      </div>`;
    }).join('')}
  </div>
</div>`;
}

// ─── MGR FORECAST ───────────────────────────────────────
function mgrForecast(u,m,s,day){
  const isCurrentMonth=!!day;
  if(!isCurrentMonth)return`<div class="card"><div style="text-align:center;color:var(--mu);padding:30px">
    <div style="font-size:32px;margin-bottom:10px">🎯</div>
    Прогноз доступен только для текущего месяца<br>
    <span class="xs">Выберите актуальный месяц вверху</span>
  </div></div>`;

  const rem=m.days-day;
  const needPerDay=rem>0?((m.targets.iron-s.kpiIronCount)/rem):0;
  const onTrack=s.fc.iron>=m.targets.iron;

  return `
<div class="al ${onTrack?'su':'inf'} mb14">
  📅 День <b>${day}</b> из <b>${m.days}</b> · Осталось <b>${rem}</b> дней · Коэф. ×${(m.days/day).toFixed(2)}
  ${onTrack?` · <b>✓ На пути к выполнению плана!</b>`:` · <b>Нужно ${Math.ceil(needPerDay*10)/10} сделок/день</b>`}
</div>

<div class="g4 mb14">
  <div class="met"><div class="lb">Прогноз сделок</div><div class="vl" style="color:${s.fc.iron>=m.targets.iron?'var(--gr)':'var(--or)'}">${Math.round(s.fc.iron)}</div><div class="sb2">из ${m.targets.iron}</div></div>
  <div class="met"><div class="lb">Прогноз KPI</div><div class="vl" style="color:${kpiC(s.kpi)}">${fmtKpi(s.kpi)}</div></div>
  <div class="met"><div class="lb">Прогноз ЗП</div><div class="vl" style="color:var(--gr)">${fmt(s.fc.zp)} ₽</div></div>
  <div class="met"><div class="lb">Нужно/день</div><div class="vl" style="color:${needPerDay>2?'var(--re)':needPerDay>1?'var(--or)':'var(--gr)'}">${needPerDay>0?needPerDay.toFixed(1):'✓'}</div></div>
</div>

<div class="card mb14">
  <div class="sh">Прогресс с прогнозом</div>
  ${Object.entries(m.schema).filter(([,c])=>c.includeInKpi).map(([k,c])=>
    foreBar(c.name,s.counts[k],s.fc[k],m.targets[k]||1)).join('')}
</div>

<div class="g2 mb14">
  ${[
    {l:'Сделок до цели',need:Math.max(0,m.targets.iron-s.kpiIronCount),hint:`${needPerDay>0?needPerDay.toFixed(1)+' сделок/день':'✓ план перекрыт'}`,col:'var(--ac)'},
    {l:'Кредитов до цели',need:Math.max(0,(m.targets.credit||8)-s.counts.credit),hint:'Предлагай кредит каждому',col:'var(--ac)'},
    {l:'Трейд-ин до цели',need:Math.max(0,(m.targets.exchange||7)-s.counts.exchange),hint:'Спрашивай про обмен первым',col:'var(--or)'},
    {l:'ПТЗ до цели',need:Math.max(0,(m.targets.ptz||4)-s.counts.ptz),hint:'Проверяй ПТЗ каждый раз',col:'var(--pu)'},
  ].map(x=>`<div class="card" style="border-left:3px solid ${x.col}">
    <div class="xs mu mb8">${x.l}</div>
    <div style="font-size:28px;font-weight:700;font-family:'Bebas Neue';color:${x.col}">${x.need===0?'✓ ПЛАН':'+'+x.need}</div>
    <div class="xs mu mt8">${x.hint}</div>
  </div>`).join('')}
</div>

<div class="card">
  <div class="sh">Декомпозиция ЗП (прогноз)</div>
  <div class="xs" style="color:var(--mu);line-height:2.2">
    ${Object.entries(m.schema).filter(([,c])=>c.includeInEarn).map(([k,c])=>{
      const fcV=Math.round(s.fc[k]),earn=fcV*c.rate;
      return `${c.name}: <b style="color:var(--tx)">${fcV}</b>×${fmt(c.rate)}₽ = <b>${fmt(earn)}₽</b><br>`;
    }).join('')}
    База прогноз: <b>${fmt(s.fc.earnBase)} ₽</b> × KPI <b style="color:${kpiC(s.kpi)}">${fmtKpi(s.kpi)}</b> = <b>${fmt(Math.round(s.fc.earnBase*s.kpi))}₽</b><br>
    ${s.earnFixed?`+ Ценники: <b style="color:var(--ye)">${fmt(s.earnFixed)} ₽</b><br>`:''}
    <div class="dv"></div>
    <b style="color:var(--gr);font-size:16px">= ${fmt(s.fc.zp)} ₽</b>
  </div>
</div>`;
}

// ─── MODAL ──────────────────────────────────────────────
function renderModal(){
  if(!modal)return'';
  const{type,data}=modal;

  if(type==='deal'){
    const{uid,mid}=data;
    const existId=data.id||null;
    const m=S.months.find(x=>x.id===mid);if(!m)return'';
    const deals=getDeals(uid,mid);
    const d=existId?deals.find(x=>x.id===existId):null;
    const chColors={iron:'',ptz:'pu',credit:'gr',exchange:'or',broker:'or',cennik:'ye',interact:'pi'};
    return `<div class="mo" id="moOvl">
<div class="mb" onclick="event.stopPropagation()">
  <div class="mt2">${d?'Редактировать':'Новая выдача'} — ${m.name}</div>
  <div class="g2">
    <div class="fl"><label>Дата</label><input type="date" id="fd_date" value="${d?d.date:new Date().toISOString().slice(0,10)}"/></div>
    <div class="fl"><label>Год выпуска</label><input id="fd_year" placeholder="2020" value="${d?d.year||'':''}"/></div>
  </div>
  <div class="g2">
    <div class="fl"><label>Марка</label><input id="fd_brand" placeholder="Toyota" value="${d?d.brand||'':''}"/></div>
    <div class="fl"><label>Модель</label><input id="fd_model" placeholder="Camry" value="${d?d.model||'':''}"/></div>
  </div>
  <div class="fl"><label>VIN-код</label><input id="fd_vin" placeholder="JT2BF12K1Y0012345" value="${d?d.vin||'':''}" style="font-family:monospace"/></div>
  <div class="fl"><label>Каналы</label>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">
      ${Object.entries(m.schema).map(([k,c])=>{
        const isOn=d?!!d[k]:k==='iron';
        const cls=chColors[k]||'';
        return `<button id="ch_${k}" class="ch${isOn?' on':''}${isOn&&cls?' '+cls:''}" onclick="toggleCh('${k}','${cls}')">${c.name}</button>`;
      }).join('')}
    </div>
  </div>
  <div class="flex g8 mt14">
    <button class="btn pr f1 jc" onclick="saveDeal('${uid}','${mid}','${existId||''}')">
      ${d?'Сохранить':'Добавить выдачу'}
    </button>
    <button class="btn" onclick="closeModal()">Отмена</button>
  </div>
</div></div>`;
  }

  if(type==='addUser'){
    return `<div class="mo" id="moOvl">
<div class="mb" onclick="event.stopPropagation()">
  <div class="mt2">Новый сотрудник</div>
  <div class="fl"><label>Полное имя</label><input id="nu_name" placeholder="Иванов Иван"/></div>
  <div class="g2">
    <div class="fl"><label>Логин</label><input id="nu_login" placeholder="ivanov"/></div>
    <div class="fl"><label>Пароль</label><input id="nu_pass" placeholder="12345"/></div>
  </div>
  <div class="fl"><label>Роль</label>
    <select id="nu_role"><option value="manager">МОП (Менеджер)</option><option value="admin">РОП/СМОП</option></select>
  </div>
  <div class="flex g8 mt14">
    <button class="btn pr f1 jc" onclick="saveNewUser()">Добавить</button>
    <button class="btn" onclick="closeModal()">Отмена</button>
  </div>
</div></div>`;
  }
  return'';
}

function bindEvents(){
  const ovl=$('moOvl');
  if(ovl)ovl.onclick=e=>{if(e.target===ovl)closeModal();};
}

// ─── ACTIONS ────────────────────────────────────────────
function doLogin(){
  const login=($('li')||{}).value?.trim();
  const pass=($('lp')||{}).value?.trim();
  const u=S.users.find(x=>x.login===login&&x.pass===pass);
  if(!u){renderLogin('Неверный логин или пароль');return;}
  S.user=u;initSelMid();save();go();
}
function doLogout(){S.user=null;save();renderLogin();}
function go(){
  if(!S.user){renderLogin();return;}
  if(S.user.role==='admin')renderAdmin();
  else renderManager();
}
function setTab(t){uiTab=t;selMgr=null;renderAdmin();}
function setMid(id){selMid=id;go();}
function setMgrTabFn(t){mgrTab=t;renderManager();}
function viewMgr(id){selMgr=id;uiTab='managers';renderAdmin();}
function openModal(type,data){modal={type,data};go();}
function closeModal(){modal=null;go();}

function toggleCh(k,cls){
  const btn=$('ch_'+k);if(!btn)return;
  const on=btn.classList.contains('on');
  btn.classList.toggle('on',!on);
  if(cls)btn.classList.toggle(cls,!on);
}

function saveDeal(uid,mid,existId){
  const brand=($('fd_brand')||{}).value?.trim()||'';
  const model=($('fd_model')||{}).value?.trim()||'';
  if(!brand&&!model){alert('Укажи марку или модель');return;}
  const m=S.months.find(x=>x.id===mid);if(!m)return;
  const deal={
    id:existId||('d'+Date.now()),
    date:$('fd_date')?.value||'',
    brand,model,
    vin:$('fd_vin')?.value?.trim()||'',
    year:$('fd_year')?.value?.trim()||'',
  };
  Object.keys(m.schema).forEach(k=>{deal[k]=$('ch_'+k)?.classList.contains('on')||false;});
  if(!S.deals[uid])S.deals[uid]={};
  if(!S.deals[uid][mid])S.deals[uid][mid]=[];
  if(existId){S.deals[uid][mid]=S.deals[uid][mid].map(d=>d.id===existId?deal:d);}
  else{S.deals[uid][mid].push(deal);}
  modal=null;save();go();
}

function delDeal(uid,mid,id){
  if(!confirm('Удалить выдачу?'))return;
  if(S.deals[uid]?.[mid])S.deals[uid][mid]=S.deals[uid][mid].filter(d=>d.id!==id);
  save();go();
}

function saveNewUser(){
  const name=$('nu_name')?.value?.trim();
  const login=$('nu_login')?.value?.trim();
  const pass=$('nu_pass')?.value?.trim();
  const role=$('nu_role')?.value||'manager';
  if(!name||!login||!pass){alert('Заполни все поля');return;}
  if(S.users.find(u=>u.login===login)){alert('Логин занят');return;}
  const av=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  S.users.push({id:'u'+Date.now(),name,login,pass,role,av});
  modal=null;save();go();
}

function removeUser(id){
  if(!confirm('Удалить сотрудника?'))return;
  S.users=S.users.filter(u=>u.id!==id);
  save();go();
}

function updSchema(mid,k,field,val){
  S.months=S.months.map(m=>{
    if(m.id!==mid)return m;
    const sc={...m.schema,[k]:{...m.schema[k]}};
    if(field==='weight')sc[k][field]=parseFloat(val)||0;
    else if(field==='rate')sc[k][field]=parseFloat(val)||0;
    else sc[k][field]=val===true||val==='true'?true:val===false||val==='false'?false:val;
    return{...m,schema:sc};
  });
  save();renderAdmin();
}

function updTarget(mid,k,val){
  S.months=S.months.map(m=>m.id!==mid?m:{...m,targets:{...m.targets,[k]:Number(val)||0}});
  save();renderAdmin();
}

function updMonthDays(mid,val){
  if(val===null)return;
  S.months=S.months.map(m=>m.id===mid?{...m,days:Number(val)||30}:m);
  save();renderAdmin();
}

function copySchemaToAll(mid){
  const src=S.months.find(x=>x.id===mid);if(!src)return;
  S.months=S.months.map(m=>m.id===mid?m:{...m,schema:JSON.parse(JSON.stringify(src.schema))});
  save();renderAdmin();alert('Формула скопирована во все месяцы');
}

function addMonth(){
  const name=prompt('Название месяца (например: Июль)');if(!name)return;
  const id='m_'+Date.now();
  const last=S.months[S.months.length-1]||{targets:{iron:20,credit:8,exchange:7,ptz:4,broker:0,cennik:0,interact:0},schema:KPI_SCHEMA_DEFAULT};
  S.months.push({id,name,days:30,targets:{...last.targets},schema:JSON.parse(JSON.stringify(last.schema))});
  selMid=id;save();go();
}

loadFromFirebase().then(()=>{
  initSelMid();
  go();
  startRealtimeSync();
});
</script>
</body>
</html>
